<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBO 직관 다이어리 & PRO 기록실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        :root {
            --theme-bg: #0f172a; 
            --theme-btn: #1e293b;
        }
        
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        
        .theme-header { background-color: var(--theme-bg); transition: background-color 0.4s ease; }
        .theme-btn-box { background-color: var(--theme-btn); transition: background-color 0.4s ease; }
        
        .tab-btn.active { background-color: var(--theme-bg); color: white; }
        .menu-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; transition: all 0.2s; font-weight: bold; white-space: nowrap; }
        .menu-btn.active { background-color: white; color: var(--theme-bg); }
        .menu-btn:not(.active) { color: rgba(255,255,255,0.7); }
        .menu-btn:not(.active):hover { color: white; background-color: rgba(255,255,255,0.1); }
        .hidden-section { display: none; }
        
        th { position: relative; }
        .sort-icon::after { content: '↕'; font-size: 0.7rem; color: #cbd5e1; margin-left: 4px; }
        .sort-asc::after { content: '▲'; color: #3b82f6; }
        .sort-desc::after { content: '▼'; color: #ef4444; }
        
        #player-modal { backdrop-filter: blur(4px); transition: opacity 0.3s; }
        .modal-hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="theme-header text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter flex items-center gap-2">
                ⚾ BASEBALL DIARY
                <select id="team-theme" onchange="changeTheme()" class="ml-4 text-sm bg-white/20 text-white border border-white/30 rounded-lg px-2 py-1 font-bold cursor-pointer outline-none">
                    <option value="default" class="text-black">KBO 통합 (기본)</option>
                    <option value="kia" class="text-black">KIA 타이거즈</option>
                    <option value="samsung" class="text-black">삼성 라이온즈</option>
                    <option value="lg" class="text-black">LG 트윈스</option>
                    <option value="doosan" class="text-black">두산 베어스</option>
                    <option value="kt" class="text-black">KT 위즈</option>
                    <option value="ssg" class="text-black">SSG 랜더스</option>
                    <option value="lotte" class="text-black">롯데 자이언츠</option>
                    <option value="hanwha" class="text-black">한화 이글스</option>
                    <option value="nc" class="text-black">NC 다이노스</option>
                    <option value="kiwoom" class="text-black">키움 히어로즈</option>
                </select>
            </h1>
            
            <div class="flex flex-wrap gap-2 theme-btn-box p-1 rounded-lg justify-center">
                <button onclick="switchMenu('menu-diary')" id="btn-menu-diary" class="menu-btn active">My Diary</button>
                <button onclick="switchMenu('menu-record')" id="btn-menu-record" class="menu-btn">기록실</button>
                <button onclick="switchMenu('menu-weather')" id="btn-menu-weather" class="menu-btn">구장 날씨</button>
                <button onclick="switchMenu('menu-food')" id="btn-menu-food" class="menu-btn">야구 푸드</button>
                <button onclick="switchMenu('menu-parking')" id="btn-menu-parking" class="menu-btn">주차 정보</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-2">
        <section id="menu-diary" class="section-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-black text-slate-800">나의 직관 기록</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 mb-8">
                <h3 class="font-bold text-lg mb-4 text-slate-700 border-b pb-2">새 직관 기록하기</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div><label class="block text-sm font-bold text-slate-500 mb-1">경기 일자</label><input type="date" id="diary-date" class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none"></div>
                    <div><label class="block text-sm font-bold text-slate-500 mb-1">장소 (구장)</label><input type="text" id="diary-stadium" placeholder="예: 챔피언스 필드" class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none"></div>
                    <div>
                        <label class="block text-sm font-bold text-slate-500 mb-1">응원 팀 결과</label>
                        <select id="diary-result" class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none">
                            <option value="승리 🥳">승리 🥳</option><option value="패배 😭">패배 😭</option><option value="무승부 😐">무승부 😐</option><option value="우천취소 ☔">우천취소 ☔</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-500 mb-1">직관 사진 (선택, 1MB 이하)</label>
                        <input type="file" id="diary-photo" accept="image/*" class="w-full border border-slate-300 rounded-lg p-1.5 focus:outline-none text-sm file:mr-4 file:py-1 file:px-4 file:rounded-lg file:border-0 file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-slate-500 mb-1">한 줄 메모</label>
                    <input type="text" id="diary-memo" placeholder="오늘 경기의 감상평이나 특별했던 순간을 남겨주세요." class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none">
                </div>
                <button onclick="saveDiary()" class="w-full theme-header text-white font-bold py-3 rounded-xl transition">기록 저장하기</button>
            </div>
            <div>
                <h3 class="font-bold text-lg mb-4 text-slate-700">지난 직관 목록</h3>
                <!-- 사진이 들어갈 수 있도록 그리드(Grid) 레이아웃으로 변경 -->
                <div id="diary-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </section>

        <section id="menu-record" class="section-content hidden-section">
            <div class="flex justify-between items-center mb-6">
                <div class="flex p-1 bg-slate-200 rounded-2xl w-fit">
                    <button onclick="changeRecordTab('team')" id="tab-team" class="tab-btn active px-8 py-3 rounded-xl text-sm font-black transition text-slate-500">팀 순위</button>
                    <button onclick="changeRecordTab('batter')" id="tab-batter" class="tab-btn px-8 py-3 rounded-xl text-sm font-black transition text-slate-500">타자 TOP 30</button>
                    <button onclick="changeRecordTab('pitcher')" id="tab-pitcher" class="tab-btn px-8 py-3 rounded-xl text-sm font-black transition text-slate-500">투수 TOP 30</button>
                </div>
                <select id="year-select" onchange="loadYearData()" class="bg-white text-slate-900 border-2 border-slate-300 rounded-xl px-4 py-2 font-bold cursor-pointer hover:border-slate-500 outline-none shadow-sm">
                </select>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-center whitespace-nowrap min-w-max">
                        <thead id="table-head" class="text-slate-500 text-xs border-b border-slate-200 bg-slate-50 uppercase"></thead>
                        <tbody id="player-tbody" class="divide-y divide-slate-100 font-medium text-sm"></tbody>
                    </table>
                </div>
            </div>
        </section>
        
        <section id="menu-weather" class="section-content hidden-section text-center py-20">
            <h2 class="text-3xl font-black text-slate-800 mb-4">🌦️ 실시간 구장 날씨</h2>
            <p class="text-slate-500 mb-8">기상청 API를 연동하여 경기 당일의 구장별 날씨와 우천 취소 확률을 제공할 예정입니다.</p>
            <div class="inline-block bg-slate-100 p-8 rounded-3xl text-slate-400 font-bold border-2 border-dashed border-slate-300">[UI 구현 예정 공간]</div>
        </section>

        <section id="menu-food" class="section-content hidden-section text-center py-20">
            <h2 class="text-3xl font-black text-slate-800 mb-4">🍔 야구 푸드 맵</h2>
            <p class="text-slate-500 mb-8">각 구장별 시그니처 메뉴와 좌석 배달 정보를 제공할 예정입니다.</p>
            <div class="inline-block bg-slate-100 p-8 rounded-3xl text-slate-400 font-bold border-2 border-dashed border-slate-300">[UI 구현 예정 공간]</div>
        </section>

        <section id="menu-parking" class="section-content hidden-section text-center py-20">
            <h2 class="text-3xl font-black text-slate-800 mb-4">🚗 주차 & 교통 정보</h2>
            <p class="text-slate-500 mb-8">공공데이터포털 API를 활용해 주변 주차장 만차 여부와 대중교통 이용 팁을 제공할 예정입니다.</p>
            <div class="inline-block bg-slate-100 p-8 rounded-3xl text-slate-400 font-bold border-2 border-dashed border-slate-300">[UI 구현 예정 공간]</div>
        </section>

    </main>

    <div id="player-modal" class="fixed inset-0 z-[100] bg-slate-900/60 flex items-center justify-center p-4 modal-hidden">
        <div id="modal-card" class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="theme-header p-6 text-white flex justify-between items-start relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-white/10 text-9xl font-black">⚾</div>
                <div class="relative z-10">
                    <p id="modal-team" class="text-white/70 font-bold text-sm tracking-widest mb-1">TEAM NAME</p>
                    <h3 id="modal-name" class="text-4xl font-black">PLAYER</h3>
                </div>
                <button onclick="closeModal()" class="text-white/50 hover:text-white text-2xl relative z-10">&times;</button>
            </div>
            <div class="p-6 bg-slate-50">
                <div id="modal-stats-grid" class="grid grid-cols-3 gap-3"></div>
            </div>
            <button onclick="closeModal()" class="w-full py-4 bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 transition">카드 닫기</button>
        </div>
    </div>

        function changeTheme() {
            const selectedTeam = document.getElementById('team-theme').value;
            const [bgColor, btnColor] = themeColors[selectedTeam];
            document.documentElement.style.setProperty('--theme-bg', bgColor);
            document.documentElement.style.setProperty('--theme-btn', btnColor);
        }

        function switchMenu(menuId) {
            const menus = ['menu-diary', 'menu-record', 'menu-weather', 'menu-food', 'menu-parking'];
            menus.forEach(m => {
                document.getElementById(m).classList.add('hidden-section');
                document.getElementById('btn-' + m).classList.remove('active');
            });
            document.getElementById(menuId).classList.remove('hidden-section');
            document.getElementById('btn-' + menuId).classList.add('active');
            if (menuId === 'menu-diary') renderDiaryList();
            if (menuId === 'menu-record' && document.getElementById('year-select').options.length === 0) initRecordRoom();
        }

        const teamHeaders = ['순위', '팀명', '경기수', '승', '패', '무', '승률', '게임차'];
        const batterHeaders = ['선수명', '팀명', '타율', '경기', '타석', '타수', '득점', '안타', '2루타', '3루타', '홈런', '루타', '타점', '희생번트', '희생플라이'];
        const pitcherHeaders = ['선수명', '팀명', '방어율', '경기', '승', '패', '세이브', '홀드', '승률', '이닝', '피안타', '피홈런', '볼넷', '사구', '탈삼진', '실점', '자책점'];

        let currentRecordTab = 'team'; 
        let currentDataList = []; 
        let sortColIndex = -1;
        let sortAscending = false;

        function initRecordRoom() {
            const select = document.getElementById('year-select');
            const years = Object.keys(kboData).sort((a, b) => b - a); 
            years.forEach(year => select.innerHTML += `<option value="${year}">${year} 시즌</option>`);
            if(years.length > 0) loadYearData();
        }

        function changeRecordTab(tab) {
            currentRecordTab = tab;
            document.getElementById('tab-team').classList.toggle('active', tab === 'team');
            document.getElementById('tab-batter').classList.toggle('active', tab === 'batter');
            document.getElementById('tab-pitcher').classList.toggle('active', tab === 'pitcher');
            loadYearData();
        }

        function loadYearData() {
            const year = document.getElementById('year-select').value;
            const yearData = kboData[year]?.all_team;
            sortColIndex = -1; 
            currentDataList = [];
            let listStr = "";
            if (currentRecordTab === 'team') listStr = yearData?.t;
            else if (currentRecordTab === 'batter') listStr = yearData?.b;
            else if (currentRecordTab === 'pitcher') listStr = yearData?.p;
            
            if(listStr && listStr.trim() !== "") {
                const items = listStr.split(',');
                items.forEach(itemStr => { currentDataList.push(itemStr.split('|')); });
            }
            renderTable();
        }

        function renderTable() {
            let headers = currentRecordTab === 'team' ? teamHeaders : (currentRecordTab === 'batter' ? batterHeaders : pitcherHeaders);
            const head = document.getElementById('table-head');
            let headHTML = '<tr>';
            if (currentRecordTab !== 'team') headHTML += '<th class="py-4 px-2">순위</th>';
            headers.forEach((h, idx) => {
                let sortClass = 'sort-icon';
                if(sortColIndex === idx) sortClass = sortAscending ? 'sort-asc' : 'sort-desc';
                headHTML += `<th class="py-4 px-3 cursor-pointer hover:text-slate-800 transition ${sortClass}" onclick="sortData(${idx})">${h}</th>`;
            });
            headHTML += '</tr>';
            head.innerHTML = headHTML;
            const tbody = document.getElementById('player-tbody');
            tbody.innerHTML = '';
            if(currentDataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${headers.length + 1}" class="py-8 text-slate-400">데이터가 없습니다.</td></tr>`;
                return;
            }
            currentDataList.forEach((p, index) => {
                let rowHTML = `<tr class="hover:bg-slate-100 transition cursor-pointer" onclick="openPlayerCard(${index})">`;
                if (currentRecordTab === 'team' && p[0] === '1') {
                     rowHTML = `<tr class="bg-yellow-50 hover:bg-yellow-100 transition cursor-pointer font-bold border-l-4 border-yellow-400">`;
                } else if (currentRecordTab !== 'team') {
                    rowHTML += `<td class="py-3 px-2 text-slate-400 font-bold">${index + 1}</td>`;
                }
                p.forEach((stat, colIdx) => {
                    let textStyle = "text-slate-600";
                    if(colIdx === 0 && currentRecordTab !== 'team') textStyle = "text-slate-900 font-bold text-base"; 
                    if(colIdx === 2 && currentRecordTab !== 'team') textStyle = "font-bold";
                    rowHTML += `<td class="py-3 px-3 ${textStyle}">${stat}</td>`;
                });
                rowHTML += `</tr>`;
                tbody.innerHTML += rowHTML;
            });
        }

        function sortData(index) {
            if (sortColIndex === index) { sortAscending = !sortAscending; } 
            else {
                sortColIndex = index;
                if (currentRecordTab === 'pitcher' && index === 2) sortAscending = true;
                else sortAscending = false; 
            }
            currentDataList.sort((a, b) => {
                let valA = a[index].trim(); let valB = b[index].trim();
                valA = valA.replace(' 1/3', '.333').replace(' 2/3', '.666'); valB = valB.replace(' 1/3', '.333').replace(' 2/3', '.666');
                let numA = parseFloat(valA.replace(/[^0-9.-]/g, '')); let numB = parseFloat(valB.replace(/[^0-9.-]/g, ''));
                if (!isNaN(numA) && !isNaN(numB)) { return sortAscending ? numA - numB : numB - numA; } 
                else { return sortAscending ? valA.localeCompare(valB) : valB.localeCompare(valA); }
            });
            renderTable();
        }

        function openPlayerCard(index) {
            if(currentRecordTab === 'team') return; 
            const p = currentDataList[index];
            const headers = currentRecordTab === 'batter' ? batterHeaders : pitcherHeaders;
            document.getElementById('modal-name').innerText = p[0];
            document.getElementById('modal-team').innerText = p[1];
            const grid = document.getElementById('modal-stats-grid');
            grid.innerHTML = '';
            for(let i=2; i<p.length; i++) {
                grid.innerHTML += `<div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-center"><div class="text-slate-400 text-[10px] font-black uppercase mb-1">${headers[i]}</div><div class="text-xl font-black text-slate-800">${p[i]}</div></div>`;
            }
            document.getElementById('player-modal').classList.remove('modal-hidden');
        }

        function closeModal() { document.getElementById('player-modal').classList.add('modal-hidden'); }

        // --- 다이어리 로직 (사진 첨부 기능 추가) ---
        function saveDiary() {
            const date = document.getElementById('diary-date').value;
            const stadium = document.getElementById('diary-stadium').value;
            const result = document.getElementById('diary-result').value;
            const memo = document.getElementById('diary-memo').value;
            const photoInput = document.getElementById('diary-photo');

            if (!date || !stadium) { alert("일자와 장소는 필수로 입력해주세요."); return; }

            let photoData = "";
            
            // 사진 파일이 업로드 된 경우
            if (photoInput.files && photoInput.files[0]) {
                const file = photoInput.files[0];
                
                // 로컬 스토리지 한계로 인해 1MB 초과 파일 차단
                if(file.size > 1024 * 1024) {
                    alert("프롤로그 버전의 저장소 한계로 인해 1MB 이하의 사진만 업로드 가능합니다.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    photoData = e.target.result; // 이미지를 텍스트 데이터(Base64)로 변환
                    processSave(date, stadium, result, memo, photoData);
                };
                reader.readAsDataURL(file);
            } else {
                // 사진 파일이 없는 경우
                processSave(date, stadium, result, memo, photoData);
            }
        }

        // 실제 저장 처리를 담당하는 내부 함수
        function processSave(date, stadium, result, memo, photo) {
            let diaries = JSON.parse(localStorage.getItem('baseball_diaries')) || [];
            diaries.unshift({ date, stadium, result, memo, photo, id: Date.now() });
            
            try {
                localStorage.setItem('baseball_diaries', JSON.stringify(diaries));
            } catch (e) {
                alert("브라우저 저장 공간이 가득 찼습니다. 기존 일기를 삭제한 후 다시 시도해주세요.");
                return;
            }

            // 입력 폼 초기화
            document.getElementById('diary-date').value = '';
            document.getElementById('diary-stadium').value = '';
            document.getElementById('diary-memo').value = '';
            document.getElementById('diary-photo').value = '';
            renderDiaryList();
        }

        function renderDiaryList() {
            const listContainer = document.getElementById('diary-list');
            const diaries = JSON.parse(localStorage.getItem('baseball_diaries')) || [];
            listContainer.innerHTML = '';
            
            if (diaries.length === 0) {
                listContainer.innerHTML = '<div class="col-span-1 md:col-span-2 text-center py-12 text-slate-400 bg-white rounded-3xl">아직 기록된 직관 일기가 없습니다.</div>';
                return;
            }
            
            diaries.forEach(diary => {
                let resultColor = diary.result.includes('승리') ? 'text-red-600 bg-red-50' : 
                                 (diary.result.includes('패배') ? 'text-blue-600 bg-blue-50' : 'text-slate-600 bg-slate-100');
                
                // 사진이 있으면 이미지 태그 생성, 없으면 빈 문자열
                let photoHTML = diary.photo ? `<img src="${diary.photo}" class="w-full h-48 object-cover rounded-xl mt-4 mb-2">` : '';

                listContainer.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <div class="font-black text-slate-800 text-lg">${diary.date}</div>
                                    <div class="text-sm font-bold text-slate-500 flex items-center gap-1 mt-1">📍 ${diary.stadium}</div>
                                </div>
                                <div class="px-3 py-1 rounded-lg font-bold text-sm ${resultColor} whitespace-nowrap">${diary.result}</div>
                            </div>
                            ${photoHTML}
                            <p class="text-slate-700 mt-2 font-medium leading-relaxed">${diary.memo || '메모 없음'}</p>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-50 text-right">
                            <button onclick="deleteDiary(${diary.id})" class="text-sm text-slate-400 hover:text-red-500 font-bold transition">기록 삭제</button>
                        </div>
                    </div>`;
            });
        }

        function deleteDiary(id) {
            let diaries = JSON.parse(localStorage.getItem('baseball_diaries')) || [];
            diaries = diaries.filter(d => d.id !== id);
            localStorage.setItem('baseball_diaries', JSON.stringify(diaries));
            renderDiaryList();
        }

        window.onload = function() {
            switchMenu('menu-diary');
        };
    </script>
</body>
</html>
