        let currentTab = 'batter';

        function loadTeams() {
            const year = document.getElementById('year-select').value;
            const teamSelect = document.getElementById('team-select');
            const teams = db[year];
            
            teamSelect.innerHTML = '';
            for (let id in teams) {
                teamSelect.innerHTML += `<option value="${id}" class="text-black">${teams[id].n}</option>`;
            }
            updateDashboard();
        }

        function changeTab(tab) {
            currentTab = tab;
            document.getElementById('tab-batter').classList.toggle('active', tab === 'batter');
            document.getElementById('tab-pitcher').classList.toggle('active', tab === 'pitcher');
            document.getElementById('tab-batter').classList.toggle('text-slate-500', tab !== 'batter');
            document.getElementById('tab-pitcher').classList.toggle('text-slate-500', tab !== 'pitcher');
            updateDashboard();
        }

        function updateDashboard() {
            const year = document.getElementById('year-select').value;
            const teamId = document.getElementById('team-select').value;
            if (!teamId) return;
            const team = db[year][teamId];

            document.getElementById('nav-bar').style.backgroundColor = team.c;
            document.getElementById('hero-bg').style.backgroundColor = team.c;
            document.getElementById('table-header-bg').style.backgroundColor = team.c;
            
            document.getElementById('team-logo').innerText = team.l || "⚾";
            document.getElementById('team-display-name').innerText = team.n;
            document.getElementById('team-slogan').innerText = team.s;
            document.getElementById('season-tag').innerText = `${year} SEASON`;
            document.getElementById('table-title').innerText = currentTab === 'batter' ? "타자 TOP 10 기록" : "투수 TOP 10 기록";

            const head = document.getElementById('table-head');
            head.innerHTML = currentTab === 'batter' 
                ? `<tr><th class="px-6 py-4">선수명</th><th class="px-6 py-4">타율</th><th class="px-6 py-4">홈런</th><th class="px-6 py-4">타점</th><th class="px-6 py-4">도루</th></tr>`
                : `<tr><th class="px-6 py-4">선수명</th><th class="px-6 py-4">방어율</th><th class="px-6 py-4">승리</th><th class="px-6 py-4">세이브</th><th class="px-6 py-4">탈삼진</th></tr>`;

            const tbody = document.getElementById('player-tbody');
            tbody.innerHTML = '';
            
            const listStr = currentTab === 'batter' ? team.b : team.p;
            if(listStr) {
                const players = listStr.split(',');
                players.forEach(playerStr => {
                    const p = playerStr.split('|');
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 text-slate-900">${p[0]}</td>
                            <td class="px-6 py-4 text-indigo-600 font-bold">${p[1]}</td>
                            <td class="px-6 py-4 text-red-500 font-bold">${p[2]}</td>
                            <td class="px-6 py-4 text-slate-500">${p[3]}</td>
                            <td class="px-6 py-4 text-slate-500 font-mono">${p[4]}</td>
                        </tr>
                    `;
                });
            }
        }

        window.onload = loadTeams;
    </script>
